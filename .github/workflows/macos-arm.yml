name: Build and Test on macOS

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: macos-15 # Versión más reciente de macOS (Sequoia)

    steps:
    - name: Checkout code including submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies from Homebrew
      run: |
        brew install autoconf automake libtool cmake cunit ninja

    - name: Configure and Build
      run: |
        # Configuramos con el flag para ignorar el warning de folding-constant
        cmake -S examples/client/udp -B build-client-udp \
          -DCMAKE_C_FLAGS="-Wno-error=gnu-folding-constant"
        cmake --build build-client-udp

    - name: Upload lwm2mclient binary
      uses: actions/upload-artifact@v4
      with:
        name: lwm2mclient-macos
        path: build-client-udp/lwm2mclient
        if-no-files-found: error
